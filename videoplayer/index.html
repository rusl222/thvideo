<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Просмотр архива видео</title>
    <link href="https://vjs.zencdn.net/8.16.1/video-js.css" rel="stylesheet" />
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .timeline {
            position: relative;
            width: 100%;
            height: 200px;
            background-color: rgba(0, 0, 0, 0.1); /* Прозрачный фон */
        }
        .video-bar {
            position: absolute;
            background-color: yellow;
        }

        .videoPlayer {
            width: 100vw; /* Ширина прямоугольника равна ширине окна */
            height: calc(100vw * 0.75); /* Высота прямоугольника равна 3/4 от ширины */
        }
        .container {
            position: relative;
            width: 100%;
            height: 50pt;
            background-color: rgba(0, 0, 0, 0); /* прозрачная заливка */
            border: 1px solid black; /* для видимости границ контейнера */
            overflow-x: auto; /* Горизонтальная прокрутка, если ширина больше экрана */
        }
        .rect {
            position: absolute;
            height: 100%;
            background-color: yellow;
        }
    </style>

</head>
<body>
    <video
    id="my-video"
    class="videoPlayer"
    controls
    preload="auto"
    poster="MY_VIDEO_POSTER.jpg"
    data-setup="{}"
  >

  <source src="rtsp://watcher:Watch1234@192.168.1.64:554/Streaming/Channels/101" type="video/mp4">

  <p class="vjs-no-js">
    To view this video please enable JavaScript, and consider upgrading to a
    web browser that
    <a href="https://videojs.com/html5-video-support/" target="_blank"
      >supports HTML5 video</a
    >
  </p>
  
</video>
<script src="https://vjs.zencdn.net/8.16.1/video.min.js"></script>

<div id="timeline" class="timeline"></div>
<script src="./timeline.js"></script>

<script>
    // Пример использования
    const timeline = new D3Timeline('timeline');

    // Получаем данные для конкретного дня (например, 2025-01-20)
    timeline.GetData('2025-01-20');

    // Устанавливаем текущие время и центрируем шкалу (например, на 100 секундах)
    setTimeout(() => {
        timeline.SetCurrentTime(100);  // Центрируем на 100 секундах
    }, 2000);  // Задержка для демонстрации
</script>

</body>
</html>
